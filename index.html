    /* ===== RESET & BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; font-size: 16px; }
    body {
      font-family: 'Montserrat', sans-serif;
      background: #111;
      color: #f5f5f5;
      overflow-x: hidden;
    }
    img { max-width: 100%; display: block; }
    a { text-decoration: none; color: inherit; }
    ul { list-style: none; }

    /* ===== TOKENS ===== */
    :root {
      --red:     #D90000;
      --red-dk:  #A80000;
      --yellow:  #FFD000;
      --yellow-dk:#CC9E00;
      --dark:    #111111;
      --dark2:   #1C1C1C;
      --dark3:   #242424;
      --light:   #F5F5F5;
      --muted:   #AAAAAA;
      --white:   #FFFFFF;
      --radius:  12px;
      --shadow:  0 8px 32px rgba(0,0,0,.55);
    }

    /* ===== UTILITY ===== */
    .container { width: 90%; max-width: 1200px; margin: 0 auto; }
    .section-label {
      font-family: 'Montserrat', sans-serif;
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--yellow);
      margin-bottom: .5rem;
    }
    .section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      line-height: 1;
      color: var(--white);
    }
    .section-title span { color: var(--yellow); }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      padding: .75rem 1.75rem;
      border-radius: 50px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: .9rem;
      cursor: pointer;
      border: none;
      transition: transform .2s ease, box-shadow .2s ease, background .2s ease;
      white-space: nowrap;
    }
    .btn:hover { transform: translateY(-2px); }
    .btn-primary {
      background: var(--yellow);
      color: var(--dark);
      box-shadow: 0 4px 20px rgba(255,208,0,.35);
    }
    .btn-primary:hover { background: #ffe234; box-shadow: 0 6px 28px rgba(255,208,0,.5); }
    .btn-red {
      background: var(--red);
      color: var(--white);
      box-shadow: 0 4px 20px rgba(217,0,0,.35);
    }
    .btn-red:hover { background: var(--red-dk); box-shadow: 0 6px 28px rgba(217,0,0,.5); }
    .btn-outline {
      background: transparent;
      color: var(--white);
      border: 2px solid var(--white);
    }
    .btn-outline:hover { background: var(--white); color: var(--dark); }

    /* ===== REVEAL ANIMATIONS ===== */
    .reveal { opacity: 0; transform: translateY(40px); transition: opacity .6s ease, transform .6s ease; }
    .reveal.visible { opacity: 1; transform: translateY(0); }
    .reveal-left { opacity: 0; transform: translateX(-40px); transition: opacity .6s ease, transform .6s ease; }
    .reveal-left.visible { opacity: 1; transform: translateX(0); }
    .reveal-right { opacity: 0; transform: translateX(40px); transition: opacity .6s ease, transform .6s ease; }
    .reveal-right.visible { opacity: 1; transform: translateX(0); }
